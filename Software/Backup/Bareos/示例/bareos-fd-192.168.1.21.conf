# File Daemon Configuration File
# Server: 192.168.1.21
# Purpose: Client in 192.168.1.0/24 network

FileDaemon {
  Name = Client-192-168-1-21
  FDPort = 9102
  WorkingDirectory = "/var/lib/bareos/client"
  PidDirectory = "/var/run/bareos"
  Maximum Concurrent Jobs = 2
}

Director {
  Name = bareos-dir
  Password = "ClientPassword123"
}

Messages {
  Name = Standard
  director = bareos-dir = all, !skipped, !restored
  append = "/var/log/bareos/bareos-fd.log" = all, !skipped
}