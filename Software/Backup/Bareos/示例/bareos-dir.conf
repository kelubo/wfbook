  # 池名称
  Pool Type = Backup
  # 池类型
  Recycle = yes
  # 是否回收过期卷
  AutoPrune = yes
  # 是否自动清理过期卷
  Volume Retention = 730 days
  # 卷保留时间（两年）
  Maximum Volume Bytes = 1.5T
  # 单卷最大容量（LTO5原生1.5TB）
  Maximum Volumes = 24
  # 最大卷数量（磁带库24槽）
  Label Format = "LTO5-Changer-"
  # 卷标签格式
  AutoLabel = yes
  # 是否自动标记新磁带
}

# Full Backup Pool - RDX based (for removable/offsite archive)
