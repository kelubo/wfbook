# Pool Definitions
# 池定义

# Default Pool - Disk based
# 默认池 - 基于磁盘
Pool {
  Name = Default
  # 池名称
  Pool Type = Backup
  # 池类型：Backup（备份）、Clone（克隆）、Archive（归档）等
  Recycle = yes
  # 是否回收过期卷
  AutoPrune = yes
  # 是否自动清理过期卷
  Volume Retention = 30 days
  # 卷保留时间
  Maximum Volume Bytes = 50G
  # 单卷最大容量
  Maximum Volumes = 100
  # 最大卷数量
  Label Format = "Default-"
  # 卷标签格式
}

# Full Backup Pool - Disk based (Incremental)
# 全量备份池 - 基于磁盘（增量备份池）
Pool {
  Name = File-Inc
  # 池名称
  Pool Type = Backup
  # 池类型
  Recycle = yes
  # 是否回收过期卷
  AutoPrune = yes
  # 是否自动清理过期卷
  Volume Retention = 14 days
  # 卷保留时间（增量备份保留2周）
  Maximum Volume Bytes = 50G
  # 单卷最大容量
  Maximum Volumes = 200
  # 最大卷数量
  Label Format = "File-Inc-"
  # 卷标签格式
}

# Full Backup Pool - Disk based (Full)
# 全量备份池 - 基于磁盘（全量备份池）
Pool {
  Name = File-Full
  # 池名称
  Pool Type = Backup
  # 池类型
  Recycle = yes
  # 是否回收过期卷
  AutoPrune = yes
  # 是否自动清理过期卷
  Volume Retention = 30 days
  # 卷保留时间（全量备份保留1个月）
  Maximum Volume Bytes = 100G
  # 单卷最大容量
  Maximum Volumes = 50
  # 最大卷数量
  Label Format = "File-Full-"
  # 卷标签格式
}

# Full Backup Pool - DDS4 Tape based
# 全量备份池 - 基于DDS4磁带（适合小型重要数据归档）
Pool {
  Name = Full-DDS4
  # 池名称
  Pool Type = Backup
  # 池类型
  Recycle = yes
  # 是否回收过期卷
  AutoPrune = yes
  # 是否自动清理过期卷
  Volume Retention = 180 days
  # 卷保留时间（半年）
  Maximum Volume Bytes = 20G
  # 单卷最大容量（DDS4原生20GB）
  Maximum Volumes = 20
  # 最大卷数量
  Label Format = "DDS4-"
  # 卷标签格式
  AutoLabel = yes
  # 是否自动标记新磁带
}

# Full Backup Pool - LTO5 Tape based (for long-term archive)
# 全量备份池 - 基于LTO5磁带（适合大型数据长期归档）
Pool {
  Name = Full-LTO5
  # 池名称
  Pool Type = Backup
  # 池类型
  Recycle = yes
  # 是否回收过期卷
  AutoPrune = yes
  # 是否自动清理过期卷
  Volume Retention = 365 days
  # 卷保留时间（一年）
  Maximum Volume Bytes = 1.5T
  # 单卷最大容量（LTO5原生1.5TB）
  Maximum Volumes = 10
  # 最大卷数量
  Label Format = "LTO5-"
  # 卷标签格式
  AutoLabel = yes
  # 是否自动标记新磁带
}

# Full Backup Pool - LTO5 Tape Library based
