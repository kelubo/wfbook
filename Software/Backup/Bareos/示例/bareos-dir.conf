# Director Configuration File
# 管理守护进程配置文件
# Server: 192.168.1.10
# 服务器地址
# Purpose: Central management for two network segments
# 用途：统一管理两个网段的备份
# Storage Types: Disk (Full + Incremental) + Tape Drive (DDS4 + LTO5) + Tape Library + RDX
# 存储类型：磁盘（全量+增量）+ 磁带机（DDS4 + LTO5）+ 磁带库 + RDX

Director {
  # Director资源定义 - 整个Bareos系统的核心，管理所有作业、客户端和存储
  Name = bareos-dir
  # Director名称，用于标识此管理守护进程
  DIRport = 9101
  # Director监听端口，默认9101
  QueryFile = "/etc/bareos/query.sql"
  # 查询SQL文件路径
  Maximum Concurrent Jobs = 30
  # 最大并发作业数（增加以支持多种存储类型）
  Password = "DirectorPassword123"
  # Director密码，用于验证控制台连接
  Messages = Daemon
  # 消息资源名称
}

# Database Configuration
# 数据库配置
Catalog {
  # 目录资源定义 - 存储备份元数据（文件列表、卷信息等）
  Name = MyCatalog
  # 目录名称
  dbname = bareos
  # 数据库名称
  dbuser = bareos
  # 数据库用户名
  dbpassword = "DatabasePassword123"
  # 数据库密码
  dbtype = postgresql
  # 数据库类型，支持postgresql、mysql等
  dbhost = localhost
  # 数据库主机地址
}

# Messages Configuration
# 消息配置
Messages {
  # Daemon消息资源 - 用于Director守护进程的消息
  Name = Daemon
  # 消息资源名称
  director = bareos-dir = all, !skipped, !restored
  # 发送给Director的消息级别
  mailcommand = "/usr/bin/bsmtp -h localhost -f \"\(Bareos\)\" -s \"Bareos: %t %e of %c\" %r"
  # 邮件发送命令
  operatorcommand = "/usr/bin/bsmtp -h localhost -f \"\(Bareos\)\" -s \"Bareos: Intervention needed for %j\" %r"
  # 操作员通知命令
  mail = admin@example.com = all, !skipped, !restored
  # 发送邮件给管理员
  operator = admin@example.com = mount
  # 发送挂载请求给操作员
  console = all, !skipped, !saved
  # 发送到控制台的消息
  append = "/var/log/bareos/bareos.log" = all, !skipped
  # 追加到日志文件
}

Messages {
  # Standard消息资源 - 用于作业的消息
  Name = Standard
  # 消息资源名称
  director = bareos-dir = all, !skipped, !restored
  # 发送给Director的消息级别
  console = all, !skipped, !saved
  # 发送到控制台的消息
  append = "/var/log/bareos/bareos.log" = all, !skipped
  # 追加到日志文件
}

# Job Definitions Template
# 作业定义模板
JobDefs {
  # DefaultJob作业模板 - 提供作业的默认配置
  Name = "DefaultJob"
  # 模板名称
  Type = Backup
  # 作业类型：Backup（备份）、Restore（恢复）、Verify（验证）等
  Level = Incremental
  # 默认备份级别：Full（全量）、Differential（差异）、Incremental（增量）
  Client = bareos-fd
  # 默认客户端（实际作业中会覆盖）
  FileSet = "Full Set"
  # 默认文件集（实际作业中会覆盖）
  Schedule = "WeeklyCycle"
  # 默认计划
  Storage = File
  # 默认存储（实际作业中会覆盖）
  Messages = Standard
  # 使用的消息资源
  Pool = Default
  # 使用的池（实际作业中会覆盖）
  Priority = 10
  # 作业优先级，数字越小优先级越高
  Write Bootstrap = "/var/lib/bareos/%c.bsr"
  # Bootstrap文件路径，用于快速恢复
}

# FileSet Definitions
# 文件集定义
FileSet {
  # Full Set文件集 - 备份整个系统（排除特殊目录）
  Name = "Full Set"
  # 文件集名称
  Include {
    # 包含规则
    Options {
      # 备份选项
      signature = MD5
      # 文件签名算法，用于检测文件变化
      compression = GZIP
      # 压缩算法
    }
    File = /
    # 备份根目录
  }
  Exclude {
    # 排除规则
    File = /var/lib/bareos
    # 排除Bareos自身数据目录
    File = /proc
    # 排除proc虚拟文件系统
    File = /tmp
    # 排除临时目录
    File = /sys
    # 排除sys虚拟文件系统
    File = /dev
    # 排除设备文件目录
    File = /run
    # 排除运行时目录
    File = /mnt
    # 排除挂载点
    File = /media
    # 排除媒体目录
  }
}

FileSet {
  # Linux Basic文件集 - 备份Linux系统基本目录
  Name = "Linux Basic"
  # 文件集名称
  Include {
    # 包含规则
    Options {
      # 备份选项
      signature = MD5
      # 文件签名算法
      compression = GZIP
      # 压缩算法
    }
    File = /etc
    # 备份配置文件目录
    File = /home
    # 备份用户主目录
    File = /var/www
    # 备份Web内容目录
    File = /opt
    # 备份应用程序目录
  }
  Exclude {
    # 排除规则
    File = /proc
    File = /tmp
    File = /sys
    File = /dev
  }
}

# ==================== Database Backup FileSets ====================
# 数据库备份文件集

FileSet {
  # MySQL Database Backup - 使用mysqldump备份所有数据库
  # MySQL数据库备份 - 使用mysqldump备份所有数据库
  Name = "MySQL-Backup"
  # 文件集名称
  Include {
    # 包含规则
    Options {
      # 备份选项
      signature = MD5
      # 文件签名算法
      compression = GZIP
      # 压缩算法
      onefs = no
      # 不强制单个文件系统
    }
    File = /var/lib/mysql/backup
    # MySQL备份文件存放目录
    File = /etc/my.cnf
    # MySQL配置文件
    File = /etc/my.cnf.d/
    # MySQL配置目录
  }
  Exclude {
    # 排除规则
    File = /proc
    File = /tmp
    File = /sys
    File = /dev
  }
}

FileSet {
  # PostgreSQL Database Backup - 使用pg_dump备份所有数据库
  # PostgreSQL数据库备份 - 使用pg_dump备份所有数据库
  Name = "PostgreSQL-Backup"
  # 文件集名称
  Include {
    # 包含规则
    Options {
      # 备份选项
      signature = MD5
      # 文件签名算法
      compression = GZIP
      # 压缩算法
      onefs = no
      # 不强制单个文件系统
    }
    File = /var/lib/pgsql/backup
    # PostgreSQL备份文件存放目录
    File = /var/lib/pgsql/data/
    # PostgreSQL数据目录（可选：直接备份数据目录）
    File = /var/lib/postgresql/backup
    # PostgreSQL备份文件存放目录（Debian/Ubuntu）
    File = /var/lib/postgresql/*/main/
    # PostgreSQL数据目录（Debian/Ubuntu）
    File = /etc/postgresql/
    # PostgreSQL配置目录（Debian/Ubuntu）
    File = /var/lib/pgsql/.pgpass
    # PostgreSQL密码文件
  }
  Exclude {
    # 排除规则
    File = /proc
    File = /tmp
    File = /sys
    File = /dev
    File = /var/lib/postgresql/*/main/pg_wal/
    # 排除WAL日志目录（通常单独备份）
    File = /var/lib/pgsql/data/pg_wal/
    # 排除WAL日志目录（CentOS/RHEL）
  }
}

FileSet {
  # MySQL + PostgreSQL Combined Backup
  # MySQL + PostgreSQL 组合备份
  Name = "MySQL-PostgreSQL-Backup"
  # 文件集名称
  Include {
    # 包含规则
    Options {
      # 备份选项
      signature = MD5
      # 文件签名算法
      compression = GZIP
      # 压缩算法
      onefs = no
      # 不强制单个文件系统
    }
    File = /var/lib/mysql/backup
    # MySQL备份文件存放目录
    File = /etc/my.cnf
    # MySQL配置文件
    File = /etc/my.cnf.d/
    # MySQL配置目录
    File = /var/lib/pgsql/backup
    # PostgreSQL备份文件存放目录
    File = /var/lib/postgresql/backup
    # PostgreSQL备份文件存放目录（Debian/Ubuntu）
    File = /etc/postgresql/
    # PostgreSQL配置目录（Debian/Ubuntu）
  }
  Exclude {
    # 排除规则
    File = /proc
    File = /tmp
    File = /sys
    File = /dev
  }
}

# Schedule Definitions
# 计划定义
Schedule {
  # WeeklyCycle计划 - 周循环备份计划
  Name = "WeeklyCycle"
  # 计划名称
  Run = Full 1st sun at 23:00
  # 每月第一个周日23:00执行全量备份
  Run = Differential 2nd-5th sun at 23:00
  # 每月第二到第五个周日23:00执行差异备份
  Run = Incremental mon-sat at 23:00
  # 周一到周六23:00执行增量备份
}

Schedule {
  # DailyCycle计划 - 日循环备份计划
  Name = "DailyCycle"
  # 计划名称
  Run = Full sun at 02:00
  # 周日02:00执行全量备份
  Run = Incremental mon-sat at 02:00
  # 周一到周六02:00执行增量备份
}

Schedule {
  # WeeklyFullCycle计划 - 每周全量备份计划（用于磁带库和RDX）
  Name = "WeeklyFullCycle"
  # 计划名称
  Run = Full sun at 01:00
  # 每周日01:00执行全量备份
}

# Storage Definitions
# 存储定义

# ==================== 192.168.1.0/24 Network Storage ====================
# 192.168.1.0/24网段存储

# Disk Storage - Incremental
# 磁盘存储 - 增量备份
Storage {
  Name = Storage-192-Disk-Inc
  # 存储资源名称
  Address = 192.168.1.11
  # 存储服务器地址
  SDPort = 9103
  # 存储守护进程端口
  Password = "StoragePassword123"
  # 存储守护进程密码
  Device = FileStorage-192-Inc
  # 使用的设备名称（增量备份磁盘）
  Media Type = File-Inc
  # 介质类型，用于匹配设备
  Maximum Concurrent Jobs = 4
  # 此存储的最大并发作业数
}

# Disk Storage - Full
# 磁盘存储 - 全量备份
Storage {
  Name = Storage-192-Disk-Full
  # 存储资源名称
  Address = 192.168.1.11
  # 存储服务器地址
  SDPort = 9103
  # 存储守护进程端口
  Password = "StoragePassword123"
  # 存储守护进程密码
  Device = FileStorage-192-Full
  # 使用的设备名称（全量备份磁盘）
  Media Type = File-Full
  # 介质类型，用于匹配设备
  Maximum Concurrent Jobs = 2
  # 此存储的最大并发作业数（全量备份通常不需要太高并发）
}

# DDS4 Tape Storage
# DDS4磁带存储
# DDS4规格：容量20GB（压缩后40GB），速度3MB/s（压缩后6MB/s）
Storage {
  Name = Storage-192-DDS4
  # 存储资源名称
  Address = 192.168.1.11
  # 存储服务器地址（与磁盘存储同一台服务器）
  SDPort = 9103
  # 存储守护进程端口
  Password = "StoragePassword123"
  # 存储守护进程密码
  Device = Tape-DDS4-192
  # 使用的DDS4磁带设备
  Media Type = Tape-DDS4
  # 介质类型 - DDS4磁带
  Maximum Concurrent Jobs = 1
  # 磁带机一次只能处理一个作业
}

# LTO5 Tape Storage (Standalone Drive)
# LTO5磁带存储（独立驱动器）
# LTO5规格：容量1.5TB（压缩后3TB），速度140MB/s（压缩后280MB/s）
Storage {
  Name = Storage-192-LTO5
  # 存储资源名称
  Address = 192.168.1.11
  # 存储服务器地址（与磁盘存储同一台服务器）
  SDPort = 9103
  # 存储守护进程端口
  Password = "StoragePassword123"
  # 存储守护进程密码
  Device = Tape-LTO5-192
  # 使用的LTO5磁带设备
  Media Type = Tape-LTO5
  # 介质类型 - LTO5磁带
  Maximum Concurrent Jobs = 1
  # 磁带机一次只能处理一个作业
}

# LTO5 Tape Library (Autochanger)
# LTO5磁带库（自动加载器）
# 磁带库规格：24槽位，1个LTO5驱动器，总容量36TB（压缩后72TB）
Storage {
  Name = Storage-192-Changer
  # 存储资源名称
  Address = 192.168.1.11
  # 存储服务器地址（与磁盘存储同一台服务器）
  SDPort = 9103
  # 存储守护进程端口
  Password = "StoragePassword123"
  # 存储守护进程密码
  Device = Tape-LTO5-Changer-192
  # 使用的磁带库设备
  Media Type = Tape-LTO5-Changer
  # 介质类型 - 磁带库LTO5磁带
  Maximum Concurrent Jobs = 1
  # 磁带库一次只能处理一个作业（单驱动器）
  Autochanger = yes
  # 启用自动加载器支持
}

# RDX Storage
# RDX存储 - 可移动磁盘存储
# RDX规格：容量500GB~2TB（可更换墨盒），速度约100MB/s
Storage {
  Name = Storage-192-RDX
  # 存储资源名称
  Address = 192.168.1.11
  # 存储服务器地址（与磁盘存储同一台服务器）
