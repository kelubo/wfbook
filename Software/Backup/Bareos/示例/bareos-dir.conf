# ==================== Tape Migration Jobs ====================
# 磁带迁移作业 - 用于定期将旧磁带数据复制到新磁带

# Schedule for Tape Migration
# 磁带迁移计划 - 每年1月1日凌晨2点执行
Schedule {
  Name = "YearlyTapeMigration"
  # 计划名称
  Run = Full 1st jan at 02:00
  # 每年1月1日02:00执行
}

# DDS4 Tape Copy Job
# DDS4磁带复制作业 - 将旧DDS4磁带数据复制到新磁带
Job {
  Name = "Copy-DDS4-Tape-Migration"
  # 作业名称
  Type = Copy
  # 作业类型：Copy（复制）
  Level = Full
  # 复制级别
  Client = Client-192-168-1-20
  # 需要指定一个客户端（用于获取FileSet）
  FileSet = "Linux Basic"
  # 使用的文件集
  Storage = Storage-192-DDS4
  # 源存储
  Pool = Full-DDS4
  # 源池
  # 目标池和存储（复制到新磁带）
  # 注意：执行复制作业时，需要在 bconsole 中指定目标卷
  Messages = Standard
  # 使用的消息资源
  Schedule = "YearlyTapeMigration"
  # 每年执行一次
  Priority = 20
  # 较低的优先级，不影响日常备份
  # 选择哪些卷进行复制
  Selection Type = Volume
  # 选择类型：Volume（按卷选择）
  # 实际执行时需要手动指定要复制的卷
}

# LTO5 Tape Copy Job (Standalone Drive)
# LTO5磁带复制作业（独立驱动器）- 将旧LTO5磁带数据复制到新磁带
Job {
  Name = "Copy-LTO5-Tape-Migration"
  # 作业名称
  Type = Copy
  # 作业类型：Copy（复制）
  Level = Full
  # 复制级别
  Client = Client-192-168-1-20
  # 需要指定一个客户端
  FileSet = "Linux Basic"
  # 使用的文件集
  Storage = Storage-192-LTO5
  # 源存储
  Pool = Full-LTO5
  # 源池
  Messages = Standard
  # 使用的消息资源
  Schedule = "YearlyTapeMigration"
  # 每年执行一次
  Priority = 20
  # 较低的优先级
  Selection Type = Volume
  # 选择类型：Volume（按卷选择）
}

# LTO5 Tape Library Copy Job
# LTO5磁带库复制作业 - 将旧磁带库中的数据复制到新磁带
Job {
  Name = "Copy-LTO5-Changer-Migration"
  # 作业名称
  Type = Copy
  # 作业类型：Copy（复制）
  Level = Full
  # 复制级别
  Client = Client-192-168-1-20
  # 需要指定一个客户端
  FileSet = "Linux Basic"
  # 使用的文件集
  Storage = Storage-192-Changer
  # 源存储
  Pool = Full-LTO5-Changer
  # 源池
  Messages = Standard
  # 使用的消息资源
  Schedule = "YearlyTapeMigration"
  # 每年执行一次
