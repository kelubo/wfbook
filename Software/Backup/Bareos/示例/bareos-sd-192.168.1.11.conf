# Storage Daemon Configuration File
# 存储守护进程配置文件
# Server: 192.168.1.11
# 服务器地址
# Purpose: Storage for 192.168.1.0/24 network
# 用途：为192.168.1.0/24网段提供存储服务
# Configuration: Disk Storage + Tape Drive (DDS4 + LTO5) + Tape Library + RDX
# 配置：磁盘存储 + 磁带机（DDS4 + LTO5） + 磁带库 + RDX

Storage {
  # 存储守护进程资源定义
  Name = Storage-192-168-1-11
  # 存储守护进程名称，必须与Director配置中的名称一致
  SDPort = 9103
  # 存储守护进程监听端口，默认9103
  WorkingDirectory = "/var/lib/bareos/storage"
  # 工作目录，用于存放临时文件
  PidDirectory = "/var/run/bareos"
  # PID文件目录
  Maximum Concurrent Jobs = 12
  # 最大并发作业数（增加以支持磁带库和RDX）
}

Director {
  # 允许连接的Director定义
  Name = bareos-dir
  # Director名称，必须与Director配置中的名称一致
  Password = "StoragePassword123"
  # Director连接密码，必须与Director配置中的密码一致
}

Messages {
  # 消息配置
  Name = Standard
  # 消息资源名称
  director = bareos-dir = all, !skipped, !restored
  # 发送给Director的消息级别
  append = "/var/log/bareos/bareos-sd.log" = all, !skipped
  # 追加到日志文件的消息级别
}

# Disk Storage Configuration - Incremental
# 磁盘存储配置 - 增量备份
# 磁盘存储 - 用于日常增量备份，速度快，支持随机访问
Device {
  Name = FileStorage-192-Inc
  # 设备名称，必须与Director配置中的Device属性一致
  Media Type = File-Inc
  # 介质类型，用于匹配Director的存储资源
  Archive Device = /backup/bareos-192/inc
  # 归档设备路径，实际存储位置（增量备份目录）
  LabelMedia = yes
  # 是否自动标记新介质
  Random Access = yes
  # 是否支持随机访问（磁盘为yes，磁带为no）
  AutomaticMount = yes
  # 是否自动挂载
  RemovableMedia = no
  # 是否可移动介质（磁盘为no，磁带为yes）
  AlwaysOpen = no
  # 是否始终保持打开状态
  Maximum Concurrent Jobs = 4
  # 此设备的最大并发作业数
  Label Format = "File-Inc-"
  # 卷标签格式
}

# Disk Storage Configuration - Full
# 磁盘存储配置 - 全量备份
# 磁盘存储 - 用于全量备份，速度快，支持随机访问
Device {
  Name = FileStorage-192-Full
  # 设备名称，必须与Director配置中的Device属性一致
  Media Type = File-Full
  # 介质类型，用于匹配Director的存储资源
  Archive Device = /backup/bareos-192/full
  # 归档设备路径，实际存储位置（全量备份目录）
  LabelMedia = yes
  # 是否自动标记新介质
  Random Access = yes
  # 是否支持随机访问（磁盘为yes，磁带为no）
  AutomaticMount = yes
  # 是否自动挂载
  RemovableMedia = no
  # 是否可移动介质（磁盘为no，磁带为yes）
  AlwaysOpen = no
  # 是否始终保持打开状态
  Maximum Concurrent Jobs = 2
  # 此设备的最大并发作业数（全量备份通常不需要太高并发）
  Label Format = "File-Full-"
  # 卷标签格式
}

# Tape Drive Configuration - DDS4
# 磁带机配置 - DDS4
# DDS4磁带机规格：
# - 容量：20GB（压缩后40GB）
# - 速度：3MB/s（压缩后6MB/s）
# - 接口：SCSI/LVD
# - 用途：适合小型备份，归档重要数据
Device {
  Name = Tape-DDS4-192
  # 设备名称
  Media Type = Tape-DDS4
  # 介质类型 - DDS4磁带
  Archive Device = /dev/nst0
  # 归档设备路径，nst0为非重绕设备，适合多卷操作
  LabelMedia = yes
  # 是否自动标记新介质
  Random Access = no
  # 磁带为顺序访问设备
  AutomaticMount = yes
  # 是否自动挂载
  RemovableMedia = yes
  # 磁带为可移动介质
  AlwaysOpen = no
  # 是否始终保持打开状态
  Maximum Concurrent Jobs = 1
  # 磁带机一次只能处理一个作业
  Label Format = "DDS4-192-"
  # 卷标签格式
  Volume Capacity = 20G
  # 单卷容量，DDS4原生20GB
  Fast Forward Space File = yes
  # 是否快速跳过空间文件
  Rewind On Close = yes
  # 关闭时是否倒带
  Drive Type = DDS4
  # 驱动器类型
  Compression = yes
  # 是否启用硬件压缩
}

# Tape Drive Configuration - LTO5
# 磁带机配置 - LTO5
# LTO5磁带机规格：
# - 容量：1.5TB（压缩后3TB）
# - 速度：140MB/s（压缩后280MB/s）
# - 接口：SAS/SCSI
# - 用途：适合大型备份，海量数据归档
Device {
  Name = Tape-LTO5-192
  # 设备名称
  Media Type = Tape-LTO5
  # 介质类型 - LTO5磁带
  Archive Device = /dev/nst1
  # 归档设备路径，nst1为第二个非重绕设备
  LabelMedia = yes
  # 是否自动标记新介质
  Random Access = no
  # 磁带为顺序访问设备
  AutomaticMount = yes
  # 是否自动挂载
  RemovableMedia = yes
  # 磁带为可移动介质
  AlwaysOpen = no
  # 是否始终保持打开状态
  Maximum Concurrent Jobs = 1
  # 磁带机一次只能处理一个作业
  Label Format = "LTO5-192-"
  # 卷标签格式
  Volume Capacity = 1.5T
  # 单卷容量，LTO5原生1.5TB
  Fast Forward Space File = yes
  # 是否快速跳过空间文件
  Rewind On Close = yes
  # 关闭时是否倒带
  Drive Type = LTO-5
  # 驱动器类型
  Compression = yes
  # 是否启用硬件压缩
}

# Tape Library Configuration - LTO5 Autochanger
# 磁带库配置 - LTO5自动加载器
# 磁带库规格：
# - 型号：IBM TS3100/TS3200 或类似型号
# - 槽位数量：24槽
# - 驱动器数量：1个LTO5驱动器
# - 容量：24 × 1.5TB = 36TB（压缩后72TB）
# - 用途：自动化磁带管理，适合大规模数据归档
Autochanger {
  Name = Changer-LTO5-192
  # 磁带库名称
  Device = /dev/sg3
  # 磁带库控制设备（SG设备）
  Changer Command = "/usr/lib/bareos/scripts/mtx-changer %c %o %S %a %d"
  # 磁带库控制命令（mtx-changer脚本）
  Changer Device = Tape-LTO5-Changer-192
  # 关联的磁带驱动器
}

Device {
  Name = Tape-LTO5-Changer-192
  # 磁带库驱动器设备名称
  Media Type = Tape-LTO5-Changer
  # 介质类型 - 磁带库LTO5磁带
  Archive Device = /dev/nst2
  # 归档设备路径，nst2为磁带库中的驱动器
  LabelMedia = yes
  # 是否自动标记新介质
  Random Access = no
  # 磁带为顺序访问设备
  AutomaticMount = yes
  # 是否自动挂载
  RemovableMedia = yes
  # 磁带为可移动介质
  AlwaysOpen = no
  # 是否始终保持打开状态
  Maximum Concurrent Jobs = 1
  # 磁带机一次只能处理一个作业
  Label Format = "LTO5-Changer-"
  # 卷标签格式
  Volume Capacity = 1.5T
  # 单卷容量，LTO5原生1.5TB
  Fast Forward Space File = yes
  # 是否快速跳过空间文件
  Rewind On Close = yes
  # 关闭时是否倒带
  Drive Type = LTO-5
  # 驱动器类型
  Compression = yes
  # 是否启用硬件压缩
  Autochanger = yes
  # 启用自动加载器支持
  Changer Device = Changer-LTO5-192
  # 关联的磁带库
}

# RDX Configuration
# RDX配置 - 可移动磁盘存储
# RDX规格：
# - 容量：500GB ~ 2TB（可更换墨盒）
# - 速度：USB 3.0，读写速度约100MB/s
# - 接口：USB 3.0/eSATA
# - 用途：可移动备份，适合异地归档，兼具磁带的可移动性和磁盘的速度
Device {
  Name = RDX-192
  # 设备名称
  Media Type = RDX
  # 介质类型 - RDX可移动磁盘
  Archive Device = /backup/bareos-192/rdx
  # 归档设备路径，RDX挂载点
  LabelMedia = yes
  # 是否自动标记新介质
  Random Access = yes
  # RDX支持随机访问（类似磁盘）
  AutomaticMount = yes
  # 是否自动挂载
  RemovableMedia = yes
  # RDX为可移动介质（可更换墨盒）
  AlwaysOpen = no
  # 是否始终保持打开状态
  Maximum Concurrent Jobs = 2
  # RDX的最大并发作业数
  Label Format = "RDX-"
  # 卷标签格式
  Volume Capacity = 1T
  # 单卷容量，RDX墨盒容量
}

