<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd"><html xmlns="http://www.w3.org/1999/xhtml"><head><title>4.6. Consent Banner</title><link rel="stylesheet" type="text/css" href="docbook-xsl.css"/><meta name="generator" content="DocBook XSL Stylesheets Vsnapshot"/></head><body><div class="section"><div class="titlepage"><div><div><h1 class="title"><a id="gui_consent_banner"/>4.6. Consent Banner</h1></div></div></div><p>A custom consent banner that has to be accepted before login can be configured
in <span class="emphasis"><em>Datacenter → Options → Consent Text</em></span>. If there is no
content, the consent banner will not be displayed. The text will be stored as a
base64 string in the <code class="literal">/etc/pve/datacenter.cfg</code> config file.</p></div></body></html>
